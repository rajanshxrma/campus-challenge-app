name: campus_challenge
description: "Campus Challenge - A mobile app to help college students stay motivated by completing daily challenges and tracking progress."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # local database for challenges, completions, achievements
  sqflite: ^2.4.2
  path: ^1.9.1
  # user preferences (theme, profile)
  shared_preferences: ^2.3.5
  # charts for progress visualization
  fl_chart: ^0.70.2
  # file path for data export/import
  path_provider: ^2.1.5
  # date formatting
  intl: ^0.20.2
  # state management
  provider: ^6.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
